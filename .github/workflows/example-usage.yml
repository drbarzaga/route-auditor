name: Security Audit (example)
# This workflow shows how to use the route-auditor GitHub Action.
# Copy the steps into your own project's workflow.

on:
  workflow_dispatch:
  pull_request:

jobs:
  audit:
    name: Audit Next.js routes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # required to post PR comments
      security-events: write # required for SARIF upload

    steps:
      - uses: actions/checkout@v4

      # Posts audit results as a PR comment, never blocks the PR
      - name: Audit routes
        uses: ayaxsoft/route-auditor@v1
        with:
          directory: .

      # Optional — also upload SARIF to GitHub Code Scanning
      - name: Audit routes (SARIF)
        uses: ayaxsoft/route-auditor@v1
        with:
          directory: .
          sarif-file: results.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: results.sarif
