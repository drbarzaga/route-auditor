name: Security Audit (example)
# This workflow shows how to use the route-auditor GitHub Action.
# It only runs manually — copy the steps into your own project's workflow.

on:
  workflow_dispatch:

jobs:
  audit:
    name: Audit Next.js routes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      # Option A — basic, fail if high or critical issues are found
      - name: Audit routes
        uses: ayaxsoft/route-auditor@v1
        with:
          directory: .
          fail-on: high

      # Option B — generate SARIF and upload to GitHub Code Scanning
      - name: Audit routes (SARIF)
        if: always()
        uses: ayaxsoft/route-auditor@v1
        with:
          directory: .
          sarif-file: results.sarif

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: results.sarif
