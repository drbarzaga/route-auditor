name: Security Audit (example)
# This workflow shows how to use the route-auditor GitHub Action.
# Copy the relevant steps into your own workflow.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  audit:
    name: Audit Next.js routes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # required for uploading SARIF to GitHub Code Scanning

    steps:
      - uses: actions/checkout@v4

      # Basic usage — fail if any high or critical issues are found
      - name: Audit routes
        uses: ayaxsoft/route-auditor@v1
        with:
          directory: .
          fail-on: high

      # Advanced — also upload SARIF to GitHub Code Scanning
      - name: Audit routes (SARIF)
        uses: ayaxsoft/route-auditor@v1
        with:
          directory: .
          fail-on: high
          sarif-file: results.sarif

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
