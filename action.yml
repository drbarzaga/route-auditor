name: Route Auditor
description: Scan Next.js routes for security vulnerabilities — App Router, Pages Router, and API Routes.
author: ayaxsoft

branding:
  icon: shield
  color: red

inputs:
  directory:
    description: Path to the Next.js project to audit
    required: false
    default: '.'
  severity:
    description: 'Minimum severity to report: critical, high, medium, low, info'
    required: false
    default: 'info'
  fail-on:
    description: 'Exit with code 1 if issues at this severity or higher are found (optional)'
    required: false
    default: ''
  sarif-file:
    description: Write SARIF output to this file path (e.g. results.sarif)
    required: false
    default: ''
  config:
    description: Path to a route-auditor.config.json file
    required: false
    default: ''
  version:
    description: Version of @route-auditor/cli to use
    required: false
    default: 'latest'
  token:
    description: GitHub token used to post PR comments (defaults to github.token)
    required: false
    default: ${{ github.token }}

outputs:
  sarif-file:
    description: Path to the generated SARIF file (if sarif-file input was set)
    value: ${{ steps.audit.outputs.sarif-file }}

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Run route-auditor
      id: audit
      shell: bash
      run: |
        ARGS="${{ inputs.directory }}"

        if [ -n "${{ inputs.severity }}" ]; then
          ARGS="$ARGS --severity ${{ inputs.severity }}"
        fi

        if [ -n "${{ inputs.config }}" ]; then
          ARGS="$ARGS --config ${{ inputs.config }}"
        fi

        # Run audit once, store as JSON
        npx @route-auditor/cli@${{ inputs.version }} audit $ARGS --output json 2>/dev/null > /tmp/route-audit-result.json || true

        # Render console output for PR comment
        npx @route-auditor/cli@${{ inputs.version }} report /tmp/route-audit-result.json > /tmp/route-audit-output.txt 2>&1 || true

        # Generate SARIF if requested
        if [ -n "${{ inputs.sarif-file }}" ]; then
          npx @route-auditor/cli@${{ inputs.version }} report /tmp/route-audit-result.json --output sarif --file ${{ inputs.sarif-file }} || true
          echo "sarif-file=${{ inputs.sarif-file }}" >> $GITHUB_OUTPUT
        fi

        echo "exit-code=0" >> $GITHUB_OUTPUT

    - name: Post PR comment
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.token }}
        script: |
          const fs = require('fs')
          const output = fs.readFileSync('/tmp/route-audit-output.txt', 'utf8').trim()

          const MARKER = '<!-- route-auditor-report -->'
          const body = `${MARKER}
          ## 🔍 Route Auditor

          <details open>
          <summary>Audit results for <code>${{ inputs.directory }}</code></summary>

          \`\`\`
          ${output}
          \`\`\`

          </details>

          > Powered by [route-auditor](https://github.com/ayaxsoft/route-auditor)`

          // Find existing comment and update, or create new
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          })

          const existing = comments.find(c => c.body.includes(MARKER))

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            })
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            })
          }

    - name: Fail if fail-on threshold exceeded
      if: inputs.fail-on != ''
      shell: bash
      run: |
        npx @route-auditor/cli@${{ inputs.version }} audit ${{ inputs.directory }} \
          --severity ${{ inputs.fail-on }} \
          --fail-on ${{ inputs.fail-on }} \
          ${{ inputs.config != '' && format('--config {0}', inputs.config) || '' }}
